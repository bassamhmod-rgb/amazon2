<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعديل عميل - {{ store.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body{
            background:#f7f9fc;
            font-family:"Cairo",sans-serif;
        }
        .page-wrap{
            max-width:900px;
            margin:40px auto;
            padding:0 14px;
        }
        .page-head{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            margin-bottom:14px;
            flex-wrap:wrap;
        }
        .card-form{
            border:0;
            border-radius:14px;
            box-shadow:0 8px 24px rgba(0,0,0,.06);
        }
        @media (max-width:768px){
            .page-wrap{ margin:20px auto; }
            .actions .btn{
                width:100%;
            }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="page-head">
        <h3 class="m-0">تعديل بيانات العميل</h3>
        <a href="{% url 'dashboard:customers_list' store.slug %}" class="btn btn-outline-secondary">العودة لقائمة العملاء</a>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} mb-3">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="card card-form">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">اسم العميل</label>
                    <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">رقم الموبايل</label>
                    <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">العنوان</label>
                    <input type="text" name="address" class="form-control" value="{{ customer.address|default:'' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">ملاحظة</label>
                    <textarea name="note" class="form-control" rows="3">{{ customer.note|default:'' }}</textarea>
                </div>

                <div class="d-flex gap-2 flex-wrap actions">
                    <button class="btn btn-primary">حفظ التعديل</button>
                    <a href="{% url 'dashboard:customers_list' store.slug %}" class="btn btn-secondary">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
