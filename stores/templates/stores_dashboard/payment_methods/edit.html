{% load static %}

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <!-- مهم جداً للريسبونسيف -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>تعديل طريقة الدفع – {{ store.slug }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">

    <style>
        body {
            background:#f6f8fa;
            font-family:"Cairo", sans-serif;
        }

        .page-box {
            background:#fff;
            padding:22px;
            border-radius:14px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            max-width:700px;
            margin:auto;
        }

        .icon-thumb {
            width:60px;
            height:60px;
            object-fit:cover;
            border-radius:6px;
            margin-top:6px;
        }

        /* ===============================
           📱 Mobile Responsive ONLY
           بدون لمس أي منطق
        ============================== */
        @media (max-width: 768px) {

            .container {
                max-width:100%;
                padding-left:12px;
                padding-right:12px;
            }

            h3 {
                font-size:1.2rem;
                text-align:center;
            }

            a.btn.btn-secondary {
                display:block;
                width:100%;
                text-align:center;
            }

            .page-box {
                padding:16px;
            }

            .form-label {
                font-size:0.9rem;
            }

            .form-control,
            textarea,
            select {
                font-size:0.9rem;
            }

            .form-check-label {
                font-size:0.9rem;
            }

            .icon-thumb {
                width:48px;
                height:48px;
            }

            button.btn-primary {
                width:100%;
                padding:12px;
                font-size:1rem;
            }
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h3 class="mb-3">
        ✏️ تعديل وسيلة الدفع – <span class="text-primary">{{ store.slug }}</span>
    </h3>

    <a href="{% url 'stores:payment_methods' store.slug %}" class="btn btn-secondary mb-3">
        ← الرجوع لقائمة وسائل الدفع
    </a>

    <div class="page-box">

        <h5 class="mb-3">تعديل بيانات الوسيلة</h5>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">اسم الوسيلة</label>
                <input type="text" name="name" class="form-control"
                       value="{{ method.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">نوع الوسيلة</label>
                <select name="type" class="form-control">
                    <option value="other"  {% if method.type == "other" %}selected{% endif %}>أخرى</option>
                    <option value="cash"   {% if method.type == "cash" %}selected{% endif %}>كاش</option>
                    <option value="cod"    {% if method.type == "cod" %}selected{% endif %}>الدفع عند الاستلام</option>
                    <option value="bank"   {% if method.type == "bank" %}selected{% endif %}>تحويل بنكي</option>
                    <option value="wallet" {% if method.type == "wallet" %}selected{% endif %}>محفظة إلكترونية</option>
                    <option value="hawala" {% if method.type == "hawala" %}selected{% endif %}>حوالة</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">اسم المستلم (اختياري)</label>
                <input type="text" name="recipient_name" class="form-control"
                       value="{{ method.recipient_name }}">
            </div>

            <div class="mb-3">
                <label class="form-label">رقم الهاتف / الحساب (اختياري)</label>
                <input type="text" name="phone_number" class="form-control"
                       value="{{ method.phone_number }}">
            </div>

            <div class="mb-3">
                <label class="form-label">رقم حساب / معلومات إضافية (اختياري)</label>
                <input type="text" name="account_number" class="form-control"
                       value="{{ method.account_number }}">
            </div>

            <div class="mb-3">
                <label class="form-label">معلومات إضافية (اختياري)</label>
                <textarea name="additional_info" rows="3"
                          class="form-control">{{ method.additional_info }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">أيقونة (اختياري)</label>
                <input type="file" name="icon" class="form-control">

                {% if method.icon %}
                    <img src="{{ method.icon.url }}" class="icon-thumb">
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">الترتيب</label>
                <input type="number" name="order" class="form-control"
                       value="{{ method.order }}">
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="is_active"
                       {% if method.is_active %}checked{% endif %}>
                <label class="form-check-label">مفعّل</label>
            </div>

            <button class="btn btn-primary px-4">
                💾 حفظ التعديلات
            </button>

        </form>

    </div>
</div>

</body>
</html>
