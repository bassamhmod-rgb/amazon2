{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>Amazon Syria | تواصل معنا</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        :root { --primary-color:#1A2A4A; --light-bg:#F3F5F7; }
        body { font-family:"Cairo",sans-serif; background:var(--light-bg); color:#222; }
        .main-header { background-color:#3a1177; border-bottom:1px solid #93afea; position:sticky; top:0; z-index:100; }
        .brand-title-en { font-size:1.4rem; font-weight:700; color:#f5f1f1; }
        .brand-subtitle { font-size:0.85rem; color:#f9f5f5; }
    </style>
</head>
<body>

<header class="main-header">
    <div class="container py-2 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                 
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="{% url 'core:contact' %}">تواصل معنا</a></li>
                    <li><a class="dropdown-item" href="{% url 'core:about' %}">حول المنصة</a></li>
                    <li><a class="dropdown-item" href="{% url 'core:terms' %}">الشروط والأحكام</a></li>
                </ul>
            </div>

            <div>
                <span class="brand-title-en">Amazon Syria</span><br>
                <span class="brand-subtitle">صفحات عامة</span>
            </div>
        </div>

        <a href="{% url 'core:index' %}" class="btn btn-light">العودة للرئيسية</a>
    </div>
</header>

<main class="py-4">
    <div class="container">
        <div class="bg-white border rounded-4 p-4 shadow-sm">
            <h1 class="h4 mb-3">تواصل معنا</h1>
            <div class="list-group">
                <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                   href="https://wa.me/963966836134" target="_blank" rel="noopener">
                    <span>واتس آب</span>
                    <span dir="ltr">اضغط هنا</span>
                </a>
                <div class="list-group">
                    <div class="d-flex justify-content-between align-items-center gap-2">
                        <span>البريد الإلكتروني</span>
                        <span id="copyEmailStatus" class="small text-success" style="display:none;">تم النسخ</span>
                    </div>
                    <a href="#" class="d-inline-block mt-2 text-decoration-none text-break" dir="ltr" id="contactEmailLink"
                       onclick="copyContactEmail(event)">
                        amazon.syria.2026@gmail.com
                    </a>
                    <div class="small text-muted mt-1">اضغط على الإيميل لنسخه</div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function copyContactEmail(event) {
    if (event) event.preventDefault();

    const linkEl = document.getElementById("contactEmailLink");
    const statusEl = document.getElementById("copyEmailStatus");
    const email = (linkEl?.textContent || "").trim();
    if (!email) return;

    const setCopied = () => {
        if (!statusEl) return;
        statusEl.style.display = "inline";
        window.setTimeout(() => {
            statusEl.style.display = "none";
        }, 1200);
    };

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(email).then(setCopied).catch(() => {});
        return;
    }

    const textarea = document.createElement("textarea");
    textarea.value = email;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "absolute";
    textarea.style.left = "-9999px";
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand("copy");
        setCopied();
    } finally {
        document.body.removeChild(textarea);
    }
}
</script>
</body>
</html>
